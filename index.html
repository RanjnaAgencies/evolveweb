<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evolve Living D2C Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* glowing background */

body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#6366f1,#9333ea);
filter:blur(180px);
top:-200px;
left:-200px;
opacity:.6;
}

body::after{
content:"";
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#06b6d4,#3b82f6);
filter:blur(180px);
bottom:-200px;
right:-200px;
opacity:.6;
}

/* header */

header{
text-align:center;
padding:50px 20px 20px;
}

.logo{
font-size:36px;
font-weight:600;
letter-spacing:1px;
}

.subtitle{
opacity:.7;
font-size:14px;
margin-top:5px;
}

/* container */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* cards */

.card{
background:rgba(255,255,255,0.05);
border-radius:18px;
padding:30px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
transition:.35s;
position:relative;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:
0 0 20px rgba(99,102,241,.6),
0 0 40px rgba(99,102,241,.4);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:14px;
opacity:.75;
}

/* subgrid */

.subgrid{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.subcard{
padding:15px;
border-radius:10px;
background:rgba(255,255,255,0.08);
text-align:center;
cursor:pointer;
transition:.3s;
}

.subcard:hover{
background:rgba(255,255,255,0.15);
box-shadow:0 0 15px rgba(255,255,255,.4);
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:10;
}

.modal-box{
width:95%;
max-width:900px;
height:85vh;
background:white;
border-radius:14px;
position:relative;
overflow:hidden;
}

.close{
position:absolute;
top:12px;
right:15px;
font-size:20px;
cursor:pointer;
color:black;
}

/* loader */

.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:5px solid #eee;
border-top:5px solid #6366f1;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0)}
100%{transform:translate(-50%,-50%) rotate(360deg)}
}

iframe{
width:100%;
height:100%;
border:none;
display:none;
}

</style>
</head>

<body>

<header>

<div class="logo">Evolve Living D2C</div>

<div class="subtitle">
A subsidiary of Ranjna Agencies Private Limited
</div>

</header>


<div class="container">

<div class="grid">

<!-- Employee Tracking -->

<div class="card">

<h3>Employee Tracking</h3>

<p>Daily attendance and visit tracking</p>

<div class="subgrid">

<div class="subcard" onclick="openForm('checkin')">
Check In
</div>

<div class="subcard" onclick="openForm('checkout')">
Check Out
</div>

<div class="subcard" onclick="openForm('visit')">
Retailer Visit
</div>

</div>

</div>


<!-- Agra -->

<div class="card">

<h3>Agra Branch Payments</h3>

<div class="subgrid">

<div class="subcard" onclick="openForm('agraCash')">
Cash Collection
</div>

<div class="subcard" onclick="openForm('agraOnline')">
Online Collection
</div>

</div>

</div>


<!-- Etawah -->

<div class="card">

<h3>Etawah Branch Payments</h3>

<div class="subgrid">

<div class="subcard" onclick="openForm('etawahCash')">
Cash Collection
</div>

<div class="subcard" onclick="openForm('etawahOnline')">
Online Collection
</div>

</div>

</div>

</div>

</div>



<!-- Modal -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="close" onclick="closeModal()">✕</div>

<div class="loader" id="loader"></div>

<iframe id="frame"></iframe>

</div>

</div>


<script>

function openForm(type){

let modal=document.getElementById("modal")
let frame=document.getElementById("frame")
let loader=document.getElementById("loader")

modal.style.display="flex"
loader.style.display="block"
frame.style.display="none"

let link=""

if(type=="visit"){

link="https://forms.zohopublic.in/sy942255gm1/form/CounterVisitTrackingForm/formperma/bnCAwS8ikFtWgcaGPa67xwJ_XUVQ4QRlbFgtFTHX1VI?zf_enablecamera=true"

}

else{

link="" // placeholder

}

frame.src=link

frame.onload=function(){

loader.style.display="none"
frame.style.display="block"

}

}

function closeModal(){

document.getElementById("modal").style.display="none"
document.getElementById("frame").src=""

}

</script>

</body>
</html>
